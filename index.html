<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarav AI | Quantum Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* VFX: Glowing Border Animation */
        .glow-border {
            position: relative;
        }
        .glow-border::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple), var(--neon-cyan));
            background-size: 400%;
            z-index: -1;
            filter: blur(10px);
            opacity: 0.3;
            animation: move 20s linear infinite;
            border-radius: inherit;
        }

        @keyframes move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Custom Scrollbar */
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        
        /* Blinking cursor effect */
        .typing-cursor::after {
            content: '█';
            animation: blink 1s step-end infinite;
            color: var(--neon-cyan);
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* ADDED: Markdown Styles for the AI */
        .markdown-body p { margin-bottom: 0.5rem; }
        .markdown-body pre { background: rgba(0, 0, 0, 0.6); padding: 12px; border-radius: 8px; border: 1px solid rgba(0, 242, 255, 0.3); overflow-x: auto; margin: 8px 0; }
        .markdown-body code { font-family: monospace; color: var(--neon-purple); background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }
        .markdown-body pre code { color: var(--neon-cyan); background: transparent; padding: 0; }
        .markdown-body strong { color: var(--neon-cyan); }
        .markdown-body ul { list-style-type: disc; margin-left: 20px; margin-bottom: 8px; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <canvas id="matrix"></canvas>

    <div class="glass glow-border w-full max-w-lg h-[85vh] rounded-3xl flex flex-col overflow-hidden">
        
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-widest text-[#00f2ff]">AARAV_AI_V1</h1>
                <p class="text-xs text-white/50 uppercase tracking-tighter">Status: Novita AI Core Online</p>
            </div>
            <div class="h-3 w-3 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_10px_#00f2ff]"></div>
        </div>

        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div class="bg-white/5 border border-white/10 p-4 rounded-2xl rounded-tl-none max-w-[85%]">
                <p class="text-sm leading-relaxed">System initialized. Neural pathways connected to Qwen 3.5 MoE. What is our objective today?</p>
            </div>
        </div>

        <div class="p-4 bg-black/20 border-t border-white/5">
            <div class="flex gap-2">
                <input type="text" id="userInput" placeholder="Input command..." 
                    class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-[#00f2ff] transition-all text-sm">
                <button id="sendBtn" 
                    class="bg-[#00f2ff] text-black font-bold px-6 py-3 rounded-xl hover:scale-105 active:scale-95 transition-all shadow-[0_0_15px_#00f2ff]">
                    EXEC
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        // --- MATRIX BACKGROUND LOGIC ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2ff22';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- AI CHAT LOGIC ---
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        // Ensure this matches your exact Hugging Face space
        const HF_SPACE_URL = "https://lord123hh-qwen-qwen3-5-35b-a3b.hf.space"; 
        let chatHistory = []; 

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendUserMessage(text);
            userInput.value = '';
            
            const aiTextElement = appendEmptyAIMessage();
            aiTextElement.classList.add("typing-cursor");

            try {
                const app = await client(HF_SPACE_URL);
                
                // --- CHATML FORMATTING ---
                // Since gr.load expects a single string, we manually inject the history
                // using Qwen's specific ChatML tags so it perfectly remembers context.
                let qwenPrompt = "<|im_start|>system\nYou are Aarav AI, a high-performance assistant. Use sharp, intense language. Keep it brief.<|im_end|>\n";
                for (let [pastUser, pastAi] of chatHistory) {
                    qwenPrompt += `<|im_start|>user\n${pastUser}<|im_end|>\n<|im_start|>assistant\n${pastAi}<|im_end|>\n`;
                }
                qwenPrompt += `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;

                // Submit request to index 0 (the default API route for gr.load)
                const result = await app.predict(0, [
                    qwenPrompt
                ]);

                // Strip out trailing tags if the API leaves them behind
                let fullResponse = result.data[0].replace(/<\|im_end\|>/g, "").trim();

                // Remove cursor and inject the parsed Markdown text
                aiTextElement.classList.remove("typing-cursor");
                aiTextElement.innerHTML = marked.parse(fullResponse);
                chatBox.scrollTop = chatBox.scrollHeight;

                chatHistory.push([text, fullResponse]);

            } catch (err) {
                console.error("Detailed Error:", err);
                aiTextElement.classList.remove("typing-cursor");
                aiTextElement.innerText = `ERROR: ${err.message || "Backend offline."}`;
            }
        }

        // --- UI HELPER FUNCTIONS ---
        function appendUserMessage(text) {
            const div = document.createElement('div');
            div.className = "bg-gradient-to-r from-[#00f2ff] to-[#bc13fe] p-4 rounded-2xl rounded-tr-none ml-auto max-w-[85%] text-black font-medium shadow-lg";
            div.innerHTML = `<p class="text-sm leading-relaxed">${text}</p>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendEmptyAIMessage() {
            const div = document.createElement('div');
            // Added the markdown-body class to style the marked.js output
            div.className = "bg-white/5 border border-white/10 p-4 rounded-2xl rounded-tl-none max-w-[85%] text-white/90 markdown-body text-sm leading-relaxed";
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div; 
        }

        // --- EVENT LISTENERS ---
        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keypress", (e) => { 
            if(e.key === "Enter") {
                e.preventDefault();
                sendMessage(); 
            }
        });
    </script>
</body>
</html>
