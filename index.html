
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK SCANNER AI | PRO</title>
    <style>
        /* CSS stays here */
        body { background: #000; color: #32CD32; font-family: monospace; overflow: hidden; margin: 0; }
        #vfx { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }
        .ui-panel { 
            border: 2px solid #32CD32; padding: 30px; 
            width: 350px; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: rgba(0,0,0,0.9);
        }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #32CD32; color: #fff; }
        button { width: 100%; padding: 15px; background: #32CD32; color: #000; border: none; font-weight: bold; cursor: pointer; }
        #status-box { margin-top: 15px; display: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<canvas id="vfx"></canvas>

<div class="ui-panel">
    <h2 style="letter-spacing: 3px;">GAMBIT_SCANNER</h2>
    <input type="text" id="urlInput" placeholder="> ENTER_URL_">
    <button id="scanBtn" onclick="runScan()">EXECUTE ANALYSIS</button>
    
    <div id="status-box">
        <div id="resText" style="font-weight: bold;"></div>
        <div id="probText" style="margin-top: 5px;"></div>
    </div>
</div>

<script>
    const API_URL = "https://lord123hh-aaravgambit.hf.space/analyze";

    // Matrix VFX Engine
    const canvas = document.getElementById('vfx');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width / 15)).fill(1);

    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#32CD32';
        drops.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random()*2), i * 15, y * 15);
            if (y * 15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 33);

    async function runScan() {
        const input = document.getElementById('urlInput').value;
        const btn = document.getElementById('scanBtn');
        const statusBox = document.getElementById('status-box');
        const resText = document.getElementById('resText');
        const probText = document.getElementById('probText');

        if (!input) return;

        btn.disabled = true;
        btn.innerText = "PROCESSING...";
        statusBox.style.display = "block";
        resText.innerText = "Connecting to GPU cluster...";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: input })
            });

            const data = await response.json();
            
            // Parsing Grok's JSON response from your HF Space
            const grokResult = JSON.parse(data.choices[0].message.content);
            const isScam = grokResult.status === "DANGEROUS";

            resText.innerText = isScam ? "🚨 THREAT IDENTIFIED" : "✅ CLEARANCE GRANTED";
            resText.style.color = isScam ? "#ff3333" : "#32CD32";
            probText.innerText = grokResult.reason;

        } catch (err) {
            resText.innerText = "SYSTEM ERROR";
            probText.innerText = "Check backend status/CORS.";
        } finally {
            btn.disabled = false;
            btn.innerText = "EXECUTE ANALYSIS";
        }
    }
</script>
</body>
</html>
