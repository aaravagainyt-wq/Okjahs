<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* 100dvh ensures it fits mobile screens perfectly without URL bar clipping */
        body { background: #ffffff; color: #000000; font-family: 'Inter', sans-serif; overflow: hidden; height: 100dvh; display: flex; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 4px; }
        
        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.5; }
        .markdown-body pre { background: #f5f5f5; padding: 12px; border-radius: 8px; border: 1px solid #e5e5e5; overflow-x: auto; margin: 8px 0; font-size: 0.85rem; }
        .markdown-body code { font-family: monospace; background: #f5f5f5; padding: 2px 4px; border-radius: 4px; font-size: 0.85rem; }
        .markdown-body pre code { background: transparent; padding: 0; }
        .markdown-body strong { font-weight: 600; }
        .markdown-body ul { list-style-type: disc; margin-left: 20px; margin-bottom: 8px; }
        
        .typing-cursor::after { content: '█'; animation: blink 1s step-end infinite; margin-left: 4px; }
        @keyframes blink { 50% { opacity: 0; } }

        .model-active { background-color: #000; color: #fff; border-color: #000; }
        .model-inactive { background-color: #fff; color: #666; border-color: #e5e5e5; }
        
        /* Mobile Sidebar Transitions */
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
        @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
    </style>
</head>
<body class="antialiased">

    <div id="tos-modal" class="fixed inset-0 bg-white z-[60] flex flex-col items-center justify-center p-6 hidden">
        <div class="max-w-md w-full space-y-6">
            <div>
                <h2 class="text-2xl font-bold tracking-tight">Welcome to Fase</h2>
                <p class="text-gray-500 mt-2 text-sm">Review safety protocols to initialize.</p>
            </div>
            <div class="bg-gray-50 border border-gray-200 p-4 rounded-lg text-sm text-gray-700 h-40 overflow-y-auto space-y-2">
                <p><strong>1. Experimental:</strong> AI can make mistakes.</p>
                <p><strong>2. Safety Protocol:</strong> Fase is bound by strict rules against harm, discrimination, and illegal activity.</p>
                <p><strong>3. Privacy:</strong> Do not input sensitive personal data.</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="userNameInput" placeholder="Your Name" class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none focus:border-black">
                <button id="agreeBtn" class="w-full bg-black text-white font-medium px-6 py-3 rounded-lg hover:bg-gray-800 transition-all">Agree & Enter</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="w-full h-full flex hidden opacity-0 transition-opacity duration-300 relative">
        
        <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/20 z-40 hidden md:hidden"></div>

        <div id="sidebar" class="sidebar-closed absolute md:relative z-50 w-64 h-full bg-gray-50 border-r border-gray-200 flex flex-col shrink-0 shadow-xl md:shadow-none">
            <div class="p-4 border-b border-gray-200 flex justify-between items-center">
                <h1 class="text-lg font-bold tracking-tight">Fase</h1>
                <button onclick="toggleSidebar()" class="md:hidden p-2 text-gray-500 hover:text-black">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-3">
                <button onclick="createNewChat()" class="w-full bg-white border border-gray-200 text-sm font-medium py-2 rounded-lg hover:bg-gray-100 transition-all flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Chat
                </button>
            </div>
            <div id="sidebar-history" class="flex-1 overflow-y-auto p-3 space-y-1"></div>
            <div class="p-4 border-t border-gray-200 text-xs text-gray-400">
                User: <span id="user-display" class="font-semibold text-gray-600"></span>
            </div>
        </div>

        <div class="flex-1 flex flex-col min-w-0 bg-white relative h-full">
            
            <div class="p-3 sm:p-4 border-b border-gray-200 flex justify-between items-center bg-white/95 backdrop-blur-sm z-10 shrink-0">
                
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden p-1 text-gray-600 hover:text-black active:scale-95">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <span class="font-bold tracking-tight md:hidden">Fase</span>
                </div>
                
                <div class="flex items-center p-1 bg-gray-100 rounded-lg overflow-x-auto hide-scrollbar max-w-[60vw]">
                    <button onclick="setModel('flash')" id="btn-flash" class="px-3 sm:px-4 py-1.5 text-[11px] sm:text-xs font-semibold rounded-md border model-inactive shrink-0">Flash</button>
                    <button onclick="setModel('pro')" id="btn-pro" class="px-3 sm:px-4 py-1.5 text-[11px] sm:text-xs font-semibold rounded-md border model-active shrink-0">Pro</button>
                    <button onclick="setModel('thinking')" id="btn-thinking" class="px-3 sm:px-4 py-1.5 text-[11px] sm:text-xs font-semibold rounded-md border model-inactive shrink-0">Thinking</button>
                </div>
            </div>

            <div id="chat-box" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 pb-4"></div>

            <div class="w-full bg-white border-t border-gray-200 p-3 shrink-0 pb-safe">
                <div id="imagePreviewContainer" class="hidden mb-2 relative inline-block">
                    <img id="imagePreview" src="" class="h-12 w-12 object-cover rounded-md border border-gray-300">
                    <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-black text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">×</button>
                </div>
                
                <div class="flex items-end gap-2 max-w-4xl mx-auto">
                    <label class="cursor-pointer p-2 sm:p-3 bg-gray-50 border border-gray-200 rounded-xl hover:bg-gray-100 text-gray-500 shrink-0 mb-[1px]">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                        <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
                    </label>

                    <input type="text" id="userInput" placeholder="Message Fase..." class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-3 sm:px-4 py-3 outline-none focus:border-black text-sm h-[44px] sm:h-[50px]">
                    
                    <button id="sendBtn" class="bg-black text-white font-medium px-4 sm:px-6 py-2 sm:py-3 rounded-xl hover:bg-gray-800 text-sm h-[44px] sm:h-[50px] shrink-0">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
<script>
const API_URL = "https://lord123hh-shsj.hf.space/chat";

let currentChat = {
    id: Date.now(),
    title: "New Chat",
    messages: []
};

let currentImageBase64 = null;
let activeModel = "pro";

function addMessage(role, content, image = null) {
    const chatContainer = document.getElementById("chatContainer");

    const messageDiv = document.createElement("div");
    messageDiv.className = `message ${role}`;

    if (image) {
        const img = document.createElement("img");
        img.src = image;
        img.style.maxWidth = "200px";
        img.style.borderRadius = "10px";
        messageDiv.appendChild(img);
    }

    if (content) {
        const textDiv = document.createElement("div");
        textDiv.textContent = content;
        messageDiv.appendChild(textDiv);
    }

    chatContainer.appendChild(messageDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

function setModel(model) {
    activeModel = model;

    document.querySelectorAll(".model-btn").forEach(btn => {
        btn.classList.remove("active");
    });

    document.getElementById(model + "Btn").classList.add("active");
}

function clearImage() {
    currentImageBase64 = null;
    document.getElementById("imagePreview").innerHTML = "";
}

function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        currentImageBase64 = e.target.result;

        const preview = document.getElementById("imagePreview");
        preview.innerHTML = `<img src="${currentImageBase64}" style="max-width:150px;border-radius:10px;">`;
    };

    reader.readAsDataURL(file);
}

async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!text && !currentImageBase64) return;

    const savedImage = currentImageBase64;

    // Show user message
    addMessage("user", text, savedImage);
    currentChat.messages.push({ role: "user", content: text, image: savedImage });

    input.value = "";
    clearImage();

    const apiHistory = currentChat.messages.slice(0, -1).map(m => ({
        role: m.role,
        content: m.content || "Image attached"
    }));

    const payload = {
        prompt: text || "Analyze this image.",
        history: apiHistory,
        model_tier: activeModel
    };

    if (savedImage) {
        payload.image_base64 = savedImage;
    }

    console.log("Sending payload:", payload); // DEBUG

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.reply) {
            addMessage("assistant", data.reply);
            currentChat.messages.push({ role: "assistant", content: data.reply });
        } else {
            addMessage("assistant", "No reply received.");
        }

    } catch (error) {
        addMessage("assistant", "Error connecting to server.");
        console.error(error);
    }
}

document.getElementById("sendBtn").addEventListener("click", sendMessage);

document.getElementById("messageInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

document.getElementById("imageInput").addEventListener("change", handleImageUpload);
</script>
    </script>
</body>
</html>
