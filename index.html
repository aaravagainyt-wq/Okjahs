<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK SCANNER AI | PRO</title>
    <style>
        :root { --lime: #32CD32; --dark: #050505; --red: #ff3333; }
        * { box-sizing: border-box; font-family: 'Consolas', monospace; }
        body { background: var(--dark); color: var(--lime); margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #vfx-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.25; }
        .terminal-card { background: rgba(10, 10, 10, 0.95); border: 2px solid var(--lime); padding: 40px; width: 95%; max-width: 500px; box-shadow: 0 0 40px rgba(50, 205, 50, 0.2); }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--lime); }
        button { width: 100%; padding: 18px; background: var(--lime); color: #000; border: none; font-weight: 900; cursor: pointer; letter-spacing: 2px; }
        #status-box { margin-top: 25px; padding: 15px; border: 1px dashed #333; display: none; }
        .error-log { color: #555; font-size: 0.65rem; margin-top: 10px; }
    </style>
</head>
<body>

<canvas id="vfx-canvas"></canvas>

<div class="terminal-card">
    <h1 style="letter-spacing: 5px;">GAMBIT SCANNER</h1>
    <p style="font-size: 0.7rem; color: #444; margin-bottom: 25px;">NODE: lord123hh-aaravgambit // ENGINE: GROK-2</p>

    <input type="text" id="urlInput" placeholder="> TARGET_URL_">
    <button id="scanBtn" onclick="runNeuralAnalysis()">EXECUTE SCAN</button>

    <div id="status-box">
        <div id="status-display" style="font-weight: bold; font-size: 1.1rem;"></div>
        <div id="reason-display" style="color: #888; font-size: 0.85rem; margin-top: 5px;"></div>
        <div id="debug-log" class="error-log"></div>
    </div>
</div>

<script>
    const API_ENDPOINT = "https://lord123hh-aaravgambit.hf.space/analyze";

    // Matrix VFX
    const canvas = document.getElementById('vfx-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width / 15)).fill(1);
    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#32CD32';
        drops.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random()*2), i*15, y*15);
            if(y*15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 40);

    async function runNeuralAnalysis() {
        const urlInput = document.getElementById('urlInput').value;
        const statusBox = document.getElementById('status-box');
        const statusDisp = document.getElementById('status-display');
        const reasonDisp = document.getElementById('reason-display');
        const debugLog = document.getElementById('debug-log');
        const btn = document.getElementById('scanBtn');

        if(!urlInput) return;
        btn.disabled = true; 
        statusBox.style.display = "block";
        statusDisp.innerText = "ANALYZING..."; statusDisp.style.color = "#888";
        debugLog.innerText = "Connecting to lord123hh node...";

        try {
            const response = await fetch(API_ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: urlInput })
            });

            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

            const raw = await response.json();
            const grokData = JSON.parse(raw.choices[0].message.content);
            const isScam = grokData.status === "DANGEROUS";

            statusDisp.innerText = isScam ? "🚨 THREAT DETECTED" : "✅ CLEARANCE GRANTED";
            statusDisp.style.color = isScam ? "var(--red)" : "var(--lime)";
            reasonDisp.innerText = grokData.reason;
            debugLog.innerText = `MODEL: GROK-2 // CONFIDENCE: ${grokData.score}%`;

        } catch (err) {
            statusDisp.innerText = "SYSTEM ERROR"; statusDisp.style.color = "var(--red)";
            reasonDisp.innerText = "Check Connection/CORS.";
            debugLog.innerText = "LOG: " + err.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
